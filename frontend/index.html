<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IFO - Login</title>
    <link rel="stylesheet" href="./css/estilo.css" />
  </head>
  <body>
    <div class="login-container">
      <div class="login-box">
        <h1>IFO</h1>
        <p>Organizador Financeiro Inteligente</p>

        <form id="form-login">
          <div class="form-group">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              class="form-control"
              placeholder="seu@email.com"
              required
            />
          </div>

          <div class="form-group">
            <label for="senha">Senha</label>
            <input
              type="password"
              id="senha"
              class="form-control"
              placeholder="********"
              required
            />
          </div>

          <button type="submit" class="btn btn-primary" style="width: 100%">
            ENTRAR
          </button>
        </form>

        <p class="mt-3 text-center">
          Não tem conta?
          <a href="cadastro.html" style="color: #2563eb">Cadastre-se</a>
        </p>

        <div class="alert alert-info mt-3">
          <strong>Demo:</strong> douglas@ifo.teste / 123456
        </div>
      </div>
    </div>

    <script src="./js/app.js"></script>
    <script>
      document
        .getElementById("form-login")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          // Simula login - na Sprint 2 será integrado com backend
          window.location.href = "dashboard.html";
        });
    </script>
  </body>
</html>
