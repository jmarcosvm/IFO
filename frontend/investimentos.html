<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IFO - Investimentos</title>
    <link rel="stylesheet" href="../frontend/CSS/estilo.css" />
  </head>
  <body>
    <header class="header">
      <nav class="navbar">
        <div class="logo">IFO</div>
        <ul class="menu">
          <li><a href="dashboard.html">Dashboard</a></li>
          <li><a href="transacoes.html">Transações</a></li>
          <li><a href="metas.html">Metas</a></li>
          <li><a href="orcamentos.html">Orçamentos</a></li>
          <li><a href="investimentos.html" class="ativo">Investimentos</a></li>
        </ul>
        <div class="usuario" id="nome-usuario">Douglas</div>
      </nav>
    </header>

    <main class="container">
      <section class="card">
        <h2>Simulador de Investimentos</h2>

        <div class="grid-2 mb-3">
          <div>
            <div class="form-group">
              <label>Valor Mensal (R$)</label>
              <input
                type="number"
                id="valor-mensal"
                class="form-control"
                value="300"
              />
            </div>
            <div class="form-group">
              <label>Taxa de Juros (% ao mês)</label>
              <input
                type="number"
                id="taxa-juros"
                class="form-control"
                value="1.0"
                step="0.1"
              />
            </div>
            <div class="form-group">
              <label>Tempo (meses)</label>
              <input
                type="number"
                id="tempo-meses"
                class="form-control"
                value="12"
              />
            </div>
            <div class="form-group">
              <label>Tipo de Juros</label>
              <select id="tipo-juros" class="form-control">
                <option value="COMPOSTO">Juros Compostos</option>
                <option value="SIMPLES">Juros Simples</option>
              </select>
            </div>
            <button
              class="btn btn-primary"
              onclick="
                alert(
                  'Funcionalidade será implementada com backend na Sprint 3!',
                )
              "
            >
              Simular
            </button>
          </div>

          <div id="resultado-investimento">
            <!-- Preenchido via JavaScript -->
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <p>IFO - Organizador Financeiro Inteligente © 2025 | Sprint 02</p>
    </footer>

    <script src="../frontend/js/app.js"></script>
  </body>
</html>
