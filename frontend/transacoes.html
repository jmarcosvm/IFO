<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IFO - Transações</title>
    <link rel="stylesheet" href="./css/estilo.css" />
  </head>
  <body>
    <header class="header">
      <nav class="navbar">
        <div class="logo">IFO</div>
        <ul class="menu">
          <li><a href="dashboard.html">Dashboard</a></li>
          <li><a href="transacoes.html" class="ativo">Transações</a></li>
          <li><a href="metas.html">Metas</a></li>
          <li><a href="orcamentos.html">Orçamentos</a></li>
          <li><a href="investimentos.html">Investimentos</a></li>
        </ul>
        <div class="usuario" id="nome-usuario">Douglas</div>
      </nav>
    </header>

    <main class="container">
      <section class="card">
        <div class="flex mb-3">
          <h2>Transações</h2>
          <button
            class="btn btn-success"
            onclick="
              alert('Funcionalidade será implementada com backend na Sprint 3!')
            "
          >
            + Nova Transação
          </button>
        </div>

        <div class="grid-3 mb-3">
          <div class="form-group">
            <label>Filtrar por Tipo</label>
            <select class="form-control">
              <option>Todos</option>
              <option>Receitas</option>
              <option>Despesas</option>
            </select>
          </div>
          <div class="form-group">
            <label>Data Início</label>
            <input type="date" class="form-control" />
          </div>
          <div class="form-group">
            <label>Data Fim</label>
            <input type="date" class="form-control" />
          </div>
        </div>

        <table class="table">
          <thead>
            <tr>
              <th>Data</th>
              <th>Descrição</th>
              <th>Categoria</th>
              <th>Tipo</th>
              <th>Valor</th>
              <th>Status</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="tabela-transacoes">
            <!-- Preenchido via JavaScript -->
          </tbody>
        </table>
      </section>
    </main>

    <footer class="footer">
      <p>IFO - Organizador Financeiro Inteligente © 2025 | Sprint 03</p>
    </footer>

    <script src="./js/app.js"></script>
  </body>
</html>
